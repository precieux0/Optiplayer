name: 🏗️ Build OptiPlayer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Install vcpkg dependencies
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          .\vcpkg\vcpkg install fmt spdlog nlohmann-json --triplet x64-windows
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE/vcpkg" >> $env:GITHUB_ENV
      
      - name: Download FFmpeg
        run: |
          curl -L -o ffmpeg.7z https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full.7z
          7z x ffmpeg.7z -offmpeg
          $ffmpegDir = (Get-ChildItem -Path ffmpeg -Directory)[0].FullName
          echo "FFMPEG_DIR=$ffmpegDir" >> $env:GITHUB_ENV
          echo "✅ FFmpeg downloaded to: $ffmpegDir"
          
          # DEBUG: Afficher la structure
          echo "=== FFMPEG DIRECTORY STRUCTURE ==="
          dir $ffmpegDir
          echo "=== INCLUDE FOLDER ==="
          dir $ffmpegDir\include -Recurse -ErrorAction SilentlyContinue
          echo "=== LIB FOLDER ==="
          dir $ffmpegDir\lib -Recurse -ErrorAction SilentlyContinue
      
      - name: Download libmpv
        run: |
          curl -L -o mpv.7z https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-20230226.7z/download
          7z x mpv.7z -ompv
          $mpvDir = "$env:GITHUB_WORKSPACE/mpv"
          echo "MPV_DIR=$mpvDir" >> $env:GITHUB_ENV
          echo "✅ libmpv downloaded to: $mpvDir"
          
          # DEBUG: Afficher la structure
          echo "=== MPV DIRECTORY STRUCTURE ==="
          dir $mpvDir
          echo "=== INCLUDE FOLDER ==="
          dir $mpvDir\include -Recurse -ErrorAction SilentlyContinue
          echo "=== LIB FOLDER ==="
          dir $mpvDir\lib -Recurse -ErrorAction SilentlyContinue
      
      - name: Configure CMake
        run: |
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
      
      - name: Build
        run: cmake --build build --config Release --parallel
      
      - name: Prepare distribution
        run: |
          mkdir dist -Force
          if (Test-Path "build/Release/OptiPlayer.exe") {
            copy build\Release\*.exe dist\
            if (Test-Path "$env:MPV_DIR\mpv-1.dll") { copy "$env:MPV_DIR\mpv-1.dll" dist\ }
            if (Test-Path "$env:FFMPEG_DIR\bin\*.dll") { copy "$env:FFMPEG_DIR\bin\*.dll" dist\ }
            copy build\Release\*.dll dist\ -ErrorAction SilentlyContinue
            echo "✅ Distribution ready"
          } else {
            echo "❌ Build failed - executable not found"
            exit 1
          }
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: OptiPlayer
          path: dist/
