name: 🏗️ Build OptiPlayer

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
      
      - name: Install dependencies
        run: |
          .\vcpkg\vcpkg install ffmpeg libmpv fmt spdlog nlohmann-json catch2 --triplet x64-windows
      
      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="$env:GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release
      
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: OptiPlayer
          path: build/OptiPlayer-Release/
